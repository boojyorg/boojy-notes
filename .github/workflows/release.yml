name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for signing certificate
        id: cert-check
        if: runner.os == 'macOS'
        shell: bash
        run: echo "has_cert=${{ secrets.MACOS_CERTIFICATE != '' }}" >> "$GITHUB_OUTPUT"

      # macOS: signed build (when certificate secrets are configured)
      - name: Build and package (macOS signed)
        if: runner.os == 'macOS' && steps.cert-check.outputs.has_cert == 'true'
        run: npm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # macOS: unsigned build (when no certificate secrets)
      - name: Build and package (macOS unsigned)
        if: runner.os == 'macOS' && steps.cert-check.outputs.has_cert != 'true'
        run: npm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Windows build
      - name: Build and package (Windows)
        if: runner.os == 'Windows'
        run: npm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
